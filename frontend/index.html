<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Image Predictor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🍕 Food Image Predictor</h1>
        <p class="subtitle">Upload a food image to identify it</p>
        
        <div class="upload-area" id="uploadArea">
            <input type="file" id="fileInput" accept="image/*" hidden>
            <div class="upload-content">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
                </svg>
                <p>Click to upload or drag and drop</p>
                <span>PNG, JPG, JPEG</span>
            </div>
        </div>

        <div id="preview" class="preview hidden">
            <img id="previewImage" alt="Preview">
        </div>

        <button id="predictBtn" class="btn hidden">Predict</button>

        <div id="result" class="result hidden">
            <h2>Prediction Result</h2>
            <div class="result-content">
                <p class="food-name" id="foodName"></p>
                <p class="confidence" id="confidence"></p>
            </div>
        </div>

        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>Analyzing image...</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
